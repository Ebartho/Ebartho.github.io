<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Use an interactive map or type coordinates in your self to get information about the time for the sunrise and sunset on that exact position">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
</head>
<body>
    


<div id="wrapper">

    <header> 
        <img src="img/logo.png" alt="An icon with a sunset and sunrise over each other">
        <h1 id="h1rubrik">Sunset</h1>
    </header>

     <div id="map"></div>

    <main>
        <div id="time_wrapper">
            
            <i class="sprite sprite-sunrise"></i>
            <h2 id="sunrise_time"> 06 : 00 : 00</h2>
            <i class="sprite sprite-sunset"></i>
            <h2 id="sunset_time"> 22 : 00 : 00</h2>
            
        </div>
    </main>
    
    <div id="input_wrapper">
        
        <label for="lat_input">Latitud: </label>
        <input type="number" id="lat_input" name="lat_input"> 
        <label for="long_input">Longitud: </label>
        <input type="number" id="long_input" name="long_input">
        <button type="button" id="button">Check time</button>
    </div>



</div>
<h3 id="ingenJS">JavaScript måste vara påslaget för att sidan ska fungera!</h3>





<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>
<script src="script.js"></script>

</body>
</html>
